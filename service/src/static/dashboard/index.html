<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fuel Price Tracker</title>
    <link rel="stylesheet" href="/files/css/styles.css">
    <link rel="stylesheet" href="/files/css/dashboard.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <div class="dashboard">
        <header>
            <h1>Fuel Price Analytics</h1>
            <div class="filters">
                <select id="ccaaSelect">
                    <option value="">Whole Country (Spain)</option>
                </select>
                <select id="provinciaSelect">
                    <option value="">All Provinces</option>
                </select>
            </div>
        </header>

        <main class="chart-container">
            <canvas id="historyChart"></canvas>
        </main>
    </div>
    <script src="/files/js/dashboard.js"></script>
</body>
</html>
